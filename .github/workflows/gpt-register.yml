name: GPT 批量注册

on:
  workflow_dispatch:
    inputs:
      total_accounts:
        description: "注册数量"
        required: true
        default: "3"
      max_workers:
        description: "并发数"
        required: true
        default: "3"
      cpa_cleanup:
        description: "注册前清理 CPA 无效号"
        type: boolean
        default: true
      proxy:
        description: "代理地址 (留空不使用)"
        required: false
        default: ""

jobs:
  register:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Construct CPA upload URL
        run: |
          CPA_BASE="${{ secrets.CPA_URL }}"
          CPA_BASE="${CPA_BASE%/}"
          echo "UPLOAD_API_URL=${CPA_BASE}/v0/management/auth-files" >> "$GITHUB_ENV"

      - name: Run batch registration
        working-directory: gpt注册机
        env:
          YYDSMAIL_API_KEY: ${{ secrets.YYDSMAIL_API_KEY }}
          UPLOAD_API_TOKEN: ${{ secrets.CPA_KEY }}
          INPUT_TOTAL: ${{ inputs.total_accounts }}
          INPUT_WORKERS: ${{ inputs.max_workers }}
          INPUT_PROXY: ${{ inputs.proxy }}
          INPUT_CLEANUP: ${{ inputs.cpa_cleanup }}
        run: |
          python -c "
          import os
          from chatgpt_register_sentinel import run_batch

          total = int(os.environ.get('INPUT_TOTAL', '3'))
          workers = int(os.environ.get('INPUT_WORKERS', '3'))
          proxy = os.environ.get('INPUT_PROXY', '').strip() or None
          cleanup = os.environ.get('INPUT_CLEANUP', 'true').lower() == 'true'

          run_batch(
              total_accounts=total,
              max_workers=workers,
              proxy=proxy,
              cpa_cleanup=cleanup,
          )
          "
