name: Grok 批量注册

on:
  workflow_dispatch:
    inputs:
      count:
        description: "注册数量 (0=无限循环)"
        required: true
        default: "3"
      browser_proxy:
        description: "浏览器代理 (留空不使用, 如 socks5://ip:port)"
        required: false
        default: ""

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONIOENCODING: utf-8
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Clone grok-register
        run: git clone https://github.com/HoldSworder/grok-register.git grok-register-ci

      - name: Install Python dependencies
        working-directory: grok-register-ci
        run: |
          pip install -r requirements.txt
          pip install PyVirtualDisplay
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Generate config.json
        working-directory: grok-register-ci
        env:
          DUCKMAIL_BEARER: ${{ secrets.DUCKMAIL_BEARER }}
          GROK_API_ENDPOINT: ${{ secrets.GROK_API_ENDPOINT }}
          GROK_API_TOKEN: ${{ secrets.GROK_API_TOKEN }}
          BROWSER_PROXY: ${{ inputs.browser_proxy }}
        run: |
          python -c "
          import json, os
          config = {
              'run': {'count': int(os.environ.get('INPUT_COUNT', '3'))},
              'duckmail_api_base': 'https://api.duckmail.sbs',
              'duckmail_bearer': os.environ['DUCKMAIL_BEARER'],
              'proxy': '',
              'browser_proxy': os.environ.get('BROWSER_PROXY', ''),
              'api': {
                  'endpoint': os.environ.get('GROK_API_ENDPOINT', ''),
                  'token': os.environ.get('GROK_API_TOKEN', ''),
                  'append': True,
              },
          }
          with open('config.json', 'w') as f:
              json.dump(config, f, indent=4)
          print('[*] config.json generated')
          "

      - name: Run Grok registration
        working-directory: grok-register-ci
        env:
          USE_XVFB: "1"
        run: python DrissionPage_example.py --count ${{ inputs.count }}

      - name: Upload SSO tokens
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sso-tokens
          path: grok-register-ci/sso/
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registration-logs
          path: grok-register-ci/logs/
          if-no-files-found: ignore
